name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Addon version
      description: You can find this in your addon list (AddOns button on the character select screen). If you used /ef bug in-game, it may already be filled in.
      placeholder: "e.g. 1.2.7"
    validations:
      required: false

  - type: dropdown
    id: feature
    attributes:
      label: Which part of the addon?
      options:
        - UI Search (search bar, results, step-by-step guides)
        - Map Search (world map pins, zone search, dungeon entrances)
        - Options / Settings
        - Keybinds
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong.
      placeholder: Tell us what you saw.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Tell us what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How can we reproduce it?
      description: What were you doing when it happened?
      placeholder: |
        1. Open the world map
        2. Search for "bank"
        3. ...
    validations:
      required: false

  - type: textarea
    id: error
    attributes:
      label: Error message (if any)
      description: If you saw a Lua error, paste it here. Addons like BugSack or !BugGrabber can help capture these.
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, other addons that might conflict, or any other details.
    validations:
      required: false
